      <p class="eyebrow">Culture Source</p>
      <h1>母愛：萱草成為母親花的由來</h1>
      <p>孟郊〈遊子詩〉有「萱草生堂階，遊子行天涯」的句子。詩意呈現母親即使身旁有滿階萱草，仍牽掛在外奔波的孩子。</p>
      <p>後世常以萱草、萱堂連結母親形象，因此金針花不只是花卉，也承載了母愛與關懷的象徵。它不只外表亮麗，在古人心中，更像是一帖治癒心靈的良藥。</p>
